name: Vercel Static Redeploy

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  trigger-redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook secret
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing required secret: VERCEL_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl --fail --show-error --silent --location --request POST "$VERCEL_DEPLOY_HOOK_URL"
