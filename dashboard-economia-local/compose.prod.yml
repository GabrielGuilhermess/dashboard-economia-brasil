name: dashboard-economia-prod

services:
  frontend:
    build:
      context: ../dashboard-economia
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_USE_MOCKS: ${NEXT_PUBLIC_USE_MOCKS:-false}
        API_TIMEOUT_MS: ${API_TIMEOUT_MS:-10000}
        BCB_SGS_BASE_URL: ${BCB_SGS_BASE_URL:-https://api.bcb.gov.br/dados/serie/bcdata.sgs}
        BCB_PTAX_BASE_URL: ${BCB_PTAX_BASE_URL:-https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata}
        IBGE_AGREGADOS_BASE_URL: ${IBGE_AGREGADOS_BASE_URL:-https://servicodados.ibge.gov.br/api/v3/agregados}
        IBGE_MALHAS_BASE_URL: ${IBGE_MALHAS_BASE_URL:-https://servicodados.ibge.gov.br/api/v3/malhas}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/dashboard').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
